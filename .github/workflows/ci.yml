name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inmobiliaria
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inmobiliaria
      DATABASE_POOL_MAX: 1
      AUTH_SECRET: ci-only-secret-ci-only-secret
      AUTH_URL: http://localhost:3000
      APP_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Create DB roles
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d inmobiliaria -c "CREATE ROLE calafate_public_runtime NOLOGIN NOBYPASSRLS;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d inmobiliaria -c "CREATE ROLE calafate_auth_runtime NOLOGIN NOBYPASSRLS;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d inmobiliaria -c "CREATE ROLE calafate_admin_runtime NOLOGIN NOBYPASSRLS;"
      - run: npm run db:migrate:deploy
      - run: npm run ci:verify
